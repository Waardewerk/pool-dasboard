<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>World Pool Dashboard · 9-Ball</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --ink:#0d0d0d;
  --paper:#f5f3ee;
  --cloth:#1a2e45;
  --chalk:#e8e4dc;
  --felt:#0f4c2a;
  --ball:#c4006a;
  --stripe:#d4a012;
  --mono:'DM Mono',monospace;
  --sans:'DM Sans',sans-serif;
  --display:'Bebas Neue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);min-height:100vh;overflow-x:hidden}

/* grain overlay */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:.4}

header{background:var(--cloth);color:white;padding:2.5rem 2rem 2rem;position:relative;overflow:hidden}
header::after{content:'9';position:absolute;right:-1rem;top:-1.5rem;font-family:var(--display);font-size:12rem;color:white;opacity:.04;pointer-events:none;line-height:1}
.header-inner{max-width:900px;margin:0 auto;position:relative;z-index:1}
.header-label{font-family:var(--mono);font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;opacity:.5;margin-bottom:.5rem}
h1{font-family:var(--display);font-size:3rem;letter-spacing:.05em;line-height:1;margin-bottom:.75rem}
h1 span{color:var(--ball)}
.header-meta{display:flex;gap:1.5rem;flex-wrap:wrap;align-items:center}
.live-pill{display:inline-flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:2rem;padding:.25rem .75rem;font-family:var(--mono);font-size:.65rem;letter-spacing:.08em}
.live-dot{width:6px;height:6px;background:#4ade80;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.source-link{font-family:var(--mono);font-size:.65rem;color:rgba(255,255,255,.5);text-decoration:none;letter-spacing:.05em;border-bottom:1px solid rgba(255,255,255,.2);padding-bottom:1px}
.source-link:hover{color:white}

nav{background:var(--cloth);border-top:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:100}
.nav-inner{max-width:900px;margin:0 auto;display:flex;overflow-x:auto;gap:0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav-inner::-webkit-scrollbar{display:none}
.nav-btn{font-family:var(--mono);font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);padding:.85rem 1.25rem;cursor:pointer;border:none;background:none;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s}
.nav-btn:hover{color:rgba(255,255,255,.8)}
.nav-btn.active{color:white;border-bottom-color:var(--ball)}

main{max-width:900px;margin:0 auto;padding:2rem}
.section{display:none}.section.active{display:block}

/* stat bar */
.stat-bar{display:flex;gap:1px;margin-bottom:2rem;background:var(--chalk);border-radius:4px;overflow:hidden}
.stat-item{flex:1;background:white;padding:.875rem 1rem}
.stat-l{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:#888;margin-bottom:.25rem}
.stat-v{font-size:1rem;font-weight:600;color:var(--ink)}

/* search + filters */
.search-wrap{position:relative;margin-bottom:.75rem}
.search-wrap input{width:100%;padding:.6rem 1rem .6rem 2.5rem;border:1.5px solid var(--chalk);border-radius:4px;font-family:var(--mono);font-size:.75rem;background:white;color:var(--ink);outline:none;transition:border .15s}
.search-wrap input:focus{border-color:var(--cloth)}
.search-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);font-size:.8rem;color:#aaa}
.filters{display:flex;gap:.4rem;margin-bottom:1.25rem;flex-wrap:wrap}
.fb{font-family:var(--mono);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;padding:.3rem .75rem;border:1.5px solid var(--chalk);border-radius:2rem;background:white;cursor:pointer;color:#888;transition:all .15s}
.fb:hover{border-color:var(--cloth);color:var(--cloth)}
.fb.active{background:var(--cloth);border-color:var(--cloth);color:white}

/* ranking table */
.rank-table{width:100%;border-collapse:collapse}
.rank-table thead tr{border-bottom:1.5px solid var(--ink)}
.rank-table th{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:.5rem .75rem;text-align:left;color:#888;font-weight:400}
.rank-table th:first-child{text-align:right;width:2.5rem}
.rank-table th:last-child{text-align:right}
.rank-table tbody tr{border-bottom:1px solid var(--chalk);transition:background .1s}
.rank-table tbody tr:hover{background:rgba(26,46,69,.04)}
.rank-table td{padding:.6rem .75rem;font-size:.875rem}
.rank-table td:first-child{font-family:var(--mono);font-size:.8rem;font-weight:500;text-align:right;color:#aaa;width:2.5rem}
.rank-table td:last-child{font-family:var(--mono);font-size:.75rem;text-align:right;color:#888}
.r1{color:var(--stripe)!important;font-size:1rem!important}
.r2{color:#999!important}
.r3{color:#a0522d!important}
.player-cell{display:flex;align-items:center;gap:.625rem}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:.6rem;font-weight:500;flex-shrink:0}
.pname{font-weight:500;font-size:.875rem}
.pcountry{font-family:var(--mono);font-size:.6rem;color:#888;margin-top:1px}
.pts-cell{font-family:var(--mono);font-size:.75rem;color:#888}
.note-row td{font-family:var(--mono);font-size:.6rem;color:#aaa;padding:.35rem .75rem;background:rgba(0,0,0,.02);font-style:italic}
.note-row td:first-child{text-align:right}

/* toernooien */
.t-grid{display:grid;gap:.75rem}
.t-card{background:white;border:1.5px solid var(--chalk);border-radius:6px;padding:1.125rem 1.25rem;display:grid;grid-template-columns:1fr auto;gap:.25rem .75rem;align-items:start}
.t-card:hover{border-color:var(--cloth)}
.t-name{font-weight:600;font-size:.9rem;grid-column:1}
.t-loc{font-family:var(--mono);font-size:.65rem;color:#888;grid-column:1;margin-top:.125rem}
.t-desc{font-size:.8rem;color:#555;line-height:1.55;grid-column:1;margin-top:.5rem}
.t-badge{font-family:var(--mono);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;padding:.2rem .625rem;border-radius:2rem;grid-column:2;grid-row:1;align-self:start;white-space:nowrap}
.bwc{background:#fdf3e4;color:#7a4800;border:1px solid #f0d8a0}
.bet{background:#e8f1fd;color:#1a3a6b;border:1px solid #b8cff0}
.bmc{background:#fdeaf3;color:#6b0033;border:1px solid #f0b8d4}

/* weetjes */
.w-add{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--mono);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:.5rem 1rem;background:var(--cloth);color:white;border:none;border-radius:4px;cursor:pointer;margin-bottom:1rem;transition:background .15s}
.w-add:hover{background:#243e5c}
.w-form{background:white;border:1.5px solid var(--chalk);border-radius:6px;padding:1.25rem;margin-bottom:1rem;display:none}
.w-form.open{display:block}
.w-form input,.w-form textarea{width:100%;padding:.5rem .75rem;border:1.5px solid var(--chalk);border-radius:4px;font-family:var(--sans);font-size:.8rem;margin-bottom:.625rem;outline:none;background:var(--paper);color:var(--ink)}
.w-form input:focus,.w-form textarea:focus{border-color:var(--cloth)}
.w-form textarea{min-height:80px;resize:vertical}
.w-form-row{display:flex;gap:.5rem}
.w-form-row input{flex:1}
.btn-save{font-family:var(--mono);font-size:.65rem;letter-spacing:.08em;padding:.45rem 1rem;background:var(--cloth);color:white;border:none;border-radius:4px;cursor:pointer}
.btn-cancel{font-family:var(--mono);font-size:.65rem;letter-spacing:.08em;padding:.45rem .875rem;background:none;color:#888;border:1.5px solid var(--chalk);border-radius:4px;cursor:pointer;margin-left:.4rem}
.w-grid{display:grid;gap:.75rem}
.w-card{background:white;border:1.5px solid var(--chalk);border-radius:6px;padding:1.125rem 1.25rem;border-left:3px solid var(--ball)}
.w-title{font-weight:600;font-size:.9rem;margin-bottom:.375rem}
.w-text{font-size:.8rem;color:#555;line-height:1.6}
.w-player{font-family:var(--mono);font-size:.6rem;color:#aaa;margin-top:.5rem}

/* hall of fame */
.hof-grid{display:grid;gap:.75rem}
.hof-card{background:white;border:1.5px solid var(--chalk);border-radius:6px;padding:1.125rem 1.25rem;display:flex;gap:1rem}
.hof-num{font-family:var(--display);font-size:2.5rem;color:var(--chalk);line-height:1;min-width:2.5rem}
.hof-num.h1{color:var(--stripe)}.hof-num.h2{color:#ccc}.hof-num.h3{color:#c8916a}
.hof-name{font-weight:600;font-size:.95rem;margin-bottom:.15rem}
.hof-era{font-family:var(--mono);font-size:.6rem;color:#aaa;margin-bottom:.4rem}
.hof-text{font-size:.8rem;color:#555;line-height:1.6}

/* responsive */
@media(max-width:600px){
  h1{font-size:2.2rem}
  main{padding:1.25rem 1rem}
  .stat-bar{flex-wrap:wrap}
  .stat-item{min-width:calc(50% - 1px)}
  .rank-table th:nth-child(3),.rank-table td:nth-child(3){display:none}
  .t-card{grid-template-columns:1fr}
  .t-badge{grid-column:1;width:fit-content}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-label">Pool Biljart &nbsp;/&nbsp; 9-Ball</div>
    <h1>World <span>Pool</span><br>Dashboard</h1>
    <div class="header-meta">
      <span class="live-pill"><span class="live-dot"></span>Live data</span>
      <a class="source-link" href="https://wpapool.com/rankings/" target="_blank">wpapool.com/rankings ↗</a>
      <span style="font-family:var(--mono);font-size:.65rem;opacity:.35">Rankings: 5 mei 2026</span>
    </div>
  </div>
</header>

<nav>
  <div class="nav-inner">
    <button class="nav-btn active" onclick="showTab('rankings',this)">Rankings</button>
    <button class="nav-btn" onclick="showTab('toernooien',this)">Toernooien</button>
    <button class="nav-btn" onclick="showTab('weetjes',this)">Weetjes</button>
    <button class="nav-btn" onclick="showTab('hof',this)">Hall of Fame</button>
  </div>
</nav>

<main>

  <!-- RANKINGS -->
  <div id="tab-rankings" class="section active">
    <div class="stat-bar">
      <div class="stat-item"><div class="stat-l">Bron</div><div class="stat-v" style="font-size:.8rem">WPA Officieel</div></div>
      <div class="stat-item"><div class="stat-l">#1 nu</div><div class="stat-v" style="font-size:.85rem" id="stat-num1">🇵🇱 Szewczyk</div></div>
      <div class="stat-item"><div class="stat-l">Spelers</div><div class="stat-v" id="stat-count">42</div></div>
      <div class="stat-item"><div class="stat-l">Stand</div><div class="stat-v" style="font-size:.75rem" id="stat-date">5 mei 2026</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap">
      <button onclick="fetchRankings()" id="refresh-btn" style="font-family:var(--mono);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:.4rem 1rem;background:var(--cloth);color:white;border:none;border-radius:4px;cursor:pointer;display:flex;align-items:center;gap:.4rem">
        <span id="refresh-icon">↻</span> Ververs rankings
      </button>
      <span id="refresh-status" style="font-family:var(--mono);font-size:.65rem;color:#aaa"></span>
    </div>

    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="rsearch" placeholder="Zoek speler of land..." oninput="filterR(this.value)"/>
    </div>
    <div class="filters" id="nat-filters">
      <button class="fb active" onclick="filterNat('all',this)">Alle landen</button>
      <button class="fb" onclick="filterNat('POL',this)">🇵🇱 Polen</button>
      <button class="fb" onclick="filterNat('PHI',this)">🇵🇭 Filipijnen</button>
      <button class="fb" onclick="filterNat('GER',this)">🇩🇪 Duitsland</button>
      <button class="fb" onclick="filterNat('AUT',this)">🇦🇹 Oostenrijk</button>
      <button class="fb" onclick="filterNat('TPE',this)">🇹🇼 Taiwan</button>
      <button class="fb" onclick="filterNat('USA',this)">🇺🇸 USA</button>
    </div>

    <table class="rank-table" id="rtable">
      <thead><tr>
        <th>#</th>
        <th>Speler</th>
        <th>Land</th>
        <th>Punten</th>
      </tr></thead>
      <tbody id="r-body"></tbody>
    </table>
  </div>

  <!-- TOERNOOIEN -->
  <div id="tab-toernooien" class="section">
    <div class="filters">
      <button class="fb active" onclick="filterT('all',this)">Alle</button>
      <button class="fb" onclick="filterT('WC',this)">Wereldkampioenschappen</button>
      <button class="fb" onclick="filterT('ET',this)">Euro Tour</button>
      <button class="fb" onclick="filterT('MC',this)">Mosconi Cup</button>
    </div>
    <div class="t-grid" id="t-list"></div>
  </div>

  <!-- WEETJES -->
  <div id="tab-weetjes" class="section">
    <button class="w-add" onclick="toggleW()">+ Weetje toevoegen</button>
    <div class="w-form" id="wform">
      <div class="w-form-row">
        <input type="text" id="w-titel" placeholder="Titel"/>
        <input type="text" id="w-speler" placeholder="Speler"/>
      </div>
      <textarea id="w-tekst" placeholder="Beschrijving van de prestatie..."></textarea>
      <button class="btn-save" onclick="saveW()">Opslaan</button>
      <button class="btn-cancel" onclick="toggleW()">Annuleren</button>
    </div>
    <div class="w-grid" id="w-list"></div>
  </div>

  <!-- HALL OF FAME -->
  <div id="tab-hof" class="section">
    <div class="hof-grid" id="hof-list"></div>
  </div>

</main>

<footer style="text-align:center;padding:2rem;font-family:var(--mono);font-size:.6rem;color:#aaa;border-top:1px solid var(--chalk)">
  Rankings: <a href="https://wpapool.com/rankings/" style="color:#888">WPA World Pool Association</a> — 5 mei 2026 &nbsp;·&nbsp; Fargo &amp; AZ data volgt zodra beschikbaar
</footer>

<script>
const FL={POL:'🇵🇱',PHI:'🇵🇭',AIN:'🏳️',GRE:'🇬🇷',SGP:'🇸🇬',JPN:'🇯🇵',ESP:'🇪🇸',AUT:'🇦🇹',GER:'🇩🇪',NED:'🇳🇱',EST:'🇪🇪',KUW:'🇰🇼',TPE:'🇹🇼',HUN:'🇭🇺',HKG:'🇭🇰',USA:'🇺🇸',FIN:'🇫🇮',PER:'🇵🇪',GBR:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',FRA:'🇫🇷',CAN:'🇨🇦',ALB:'🇦🇱'};
const AVC={POL:{bg:'#dbeafe',c:'#1e3a8a'},PHI:{bg:'#dcfce7',c:'#14532d'},GER:{bg:'#fef3c7',c:'#78350f'},AUT:{bg:'#fce7f3',c:'#831843'},ESP:{bg:'#fee2e2',c:'#7f1d1d'},GRE:{bg:'#ede9fe',c:'#3b0764'},NED:{bg:'#dcfce7',c:'#064e3b'},JPN:{bg:'#fef2f2',c:'#7f1d1d'},SGP:{bg:'#f0fdf4',c:'#052e16'},USA:{bg:'#fef3c7',c:'#713f12'},TPE:{bg:'#dbeafe',c:'#1e3a8a'},GBR:{bg:'#ede9fe',c:'#2e1065'},HKG:{bg:'#fef2f2',c:'#7f1d1d'},EST:{bg:'#dbeafe',c:'#1e3a8a'},FIN:{bg:'#dcfce7',c:'#052e16'},PER:{bg:'#fef3c7',c:'#713f12'},FRA:{bg:'#dbeafe',c:'#1e3a8a'},CAN:{bg:'#fee2e2',c:'#7f1d1d'},HUN:{bg:'#dcfce7',c:'#052e16'},ALB:{bg:'#fee2e2',c:'#7f1d1d'},default:{bg:'#f3f4f6',c:'#374151'}};

// WPA Men's World Ranking — 5 mei 2026
// Ranks 1-42: EXACT van wpapool.com. Ranks 43+: niet opgenomen (onvoldoende data).
const WPA=[
  {r:1, n:'Szewczyk, Wojciech',     c:'POL', pts:35360},
  {r:2, n:'Biado, Carlo',            c:'PHI', pts:35316},
  {r:3, n:'Maciol, Daniel',          c:'POL', pts:32658},
  {r:4, n:'Gorst, Fedor',            c:'AIN', pts:32540},
  {r:5, n:'Kazakis, Alexander',      c:'GRE', pts:32110},
  {r:6, n:'Yapp, Aloysius',          c:'SGP', pts:31860},
  {r:7, n:'Oi, Naoyuki',             c:'JPN', pts:30520},
  {r:8, n:'Sanchez-Ruiz, Francisco', c:'ESP', pts:30240},
  {r:9, n:'Ouschan, Albin',          c:'AUT', pts:29050},
  {r:10,n:'Filler, Joshua',          c:'GER', pts:28135},
  {r:11,n:'Zielinski, Wiktor',       c:'POL', pts:28112},
  {r:12,n:'Teutscher, Marco',        c:'NED', pts:26532},
  {r:13,n:'Kasper, Stefan',          c:'GER', pts:26400},
  {r:14,n:'He, Mario',               c:'AUT', pts:26357},
  {r:15,n:'Grabe, Dennis',           c:'EST', pts:25824},
  {r:16,n:'Kural, Szymon',           c:'POL', pts:25788},
  {r:17,n:'Al-Awadhi, Bader',        c:'KUW', pts:25188},
  {r:18,n:'Wu, Kun-Lin',             c:'TPE', pts:25104},
  {r:19,n:'Souto Comino, Jonas',     c:'ESP', pts:24557},
  {r:20,n:'Loukatos, Dimitrios',     c:'GRE', pts:24076},
  {r:21,n:'Capito, Robbie',          c:'HKG', pts:23090},
  {r:21,n:'Van Boening, Shane',      c:'USA', pts:23090},
  {r:23,n:'Szolnoki, Oliver',        c:'HUN', pts:23000},
  {r:24,n:'Juszczyszyn, Konrad',     c:'POL', pts:22811},
  {r:25,n:'Lechner, Maximilian',     c:'AUT', pts:22436},
  {r:26,n:'De Luna, Jeffrey',        c:'PHI', pts:20684},
  {r:27,n:'Matikainen, Casper',      c:'FIN', pts:20370},
  {r:28,n:'Fortunski, Mieszko',      c:'POL', pts:20136},
  {r:29,n:'Hsu, Jui-An',             c:'TPE', pts:18525},
  {r:30,n:'Martinez Boza, Gerson',   c:'PER', pts:18086},
  {r:31,n:'Souquet, Ralf',           c:'GER', pts:17343},
  {r:32,n:'Sniegocki, Mateusz',      c:'POL', pts:16676},
  {r:33,n:'Shaw, Jayson',            c:'GBR', pts:16450},
  {r:34,n:'Hohmann, Thorsten',       c:'USA', pts:16320},
  {r:35,n:'Styer, Tyler',            c:'USA', pts:15676},
  {r:36,n:'Sun, Yi-Hsuan',           c:'TPE', pts:15578},
  {r:37,n:'Neuhausen, Moritz',       c:'GER', pts:15150},
  {r:38,n:'Hijikata, Hayato',        c:'JPN', pts:14990},
  {r:39,n:'Montpellier, Alex',       c:'FRA', pts:14896},
  {r:40,n:'Ko, Ping-Chung',          c:'TPE', pts:14400},
  {r:41,n:'Morra, John',             c:'CAN', pts:14128},
  {r:42,n:'Bongers, Tobias',         c:'GER', pts:14000},
];

function flag(c){return FL[c]||'🌍'}
function av(c){return AVC[c]||AVC.default}
function ini(n){return n.split(',').map(s=>s.trim()[0]).join('').slice(0,2).toUpperCase()}

let natF='all';
function renderR(list){
  const tbody=document.getElementById('r-body');
  if(!list.length){tbody.innerHTML='<tr><td colspan="4" style="text-align:center;padding:2rem;font-family:var(--mono);font-size:.75rem;color:#aaa">Geen spelers gevonden</td></tr>';return;}
  const a=av;
  tbody.innerHTML=list.map(p=>{
    const rc=p.r===1?'r1':p.r===2?'r2':p.r===3?'r3':'';
    const col=a(p.c);
    return `<tr>
      <td class="${rc}">${p.r}</td>
      <td><div class="player-cell">
        <div class="av" style="background:${col.bg};color:${col.c}">${ini(p.n)}</div>
        <div><div class="pname">${p.n}</div></div>
      </div></td>
      <td style="font-family:var(--mono);font-size:.7rem;color:#666">${flag(p.c)} ${p.c}</td>
      <td class="pts-cell">${p.pts.toLocaleString('nl-NL')}</td>
    </tr>`;
  }).join('')
  + `<tr class="note-row"><td>—</td><td colspan="3">Ranks 43–50 niet opgenomen — onvoldoende geverifieerde data</td></tr>`;
}
function filterR(q){
  let l=natF==='all'?WPA:WPA.filter(p=>p.c===natF);
  if(q)l=l.filter(p=>p.n.toLowerCase().includes(q.toLowerCase())||p.c.toLowerCase().includes(q.toLowerCase()));
  renderR(l);
}
function filterNat(n,btn){
  natF=n;
  document.querySelectorAll('#nat-filters .fb').forEach(b=>b.classList.remove('active'));

async function fetchRankings(){
  const btn = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  const status = document.getElementById('refresh-status');
  btn.disabled = true;
  icon.style.display = 'inline-block';
  icon.style.animation = 'spin .8s linear infinite';
  status.textContent = 'Ophalen van wpapool.com…';

  try {
    const res = await fetch('/api/rankings');
    const data = await res.json();

    if (data.players && data.players.length > 0) {
      // Update de globale WPA array
      WPA.length = 0;
      data.players.forEach(p => WPA.push(p));

      // Update stat bar
      const num1 = WPA[0];
      if (num1) {
        document.getElementById('stat-num1').textContent = (flag(num1.c)||'') + ' ' + num1.n.split(',')[0];
      }
      document.getElementById('stat-count').textContent = WPA.length;
      const d = new Date(data.updated);
      document.getElementById('stat-date').textContent = d.toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'});

      // Herrender tabel
      natF = 'all';
      document.querySelectorAll('#nat-filters .fb').forEach(b=>b.classList.remove('active'));
      document.querySelector('#nat-filters .fb').classList.add('active');
      renderR(WPA);

      if (data.source === 'live') {
        status.textContent = '✓ Live data — ' + WPA.length + ' spelers geladen';
        status.style.color = '#4ade80';
      } else {
        status.textContent = '⚠ Fallback data — WPA tijdelijk niet bereikbaar';
        status.style.color = '#f59e0b';
      }
    }
  } catch(e) {
    status.textContent = '✗ Fout: ' + e.message;
    status.style.color = '#f87171';
  } finally {
    btn.disabled = false;
    icon.style.animation = '';
  }
}
